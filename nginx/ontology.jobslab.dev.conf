server {
    listen 80;
    server_name ontology.jobslab.dev;

    root /home/ec2-user/jobslab-ontology/public;
    index mock.html;

    # /guide redirects to AI-powered interview on Jurin
    location = /guide {
        return 302 https://jurin.jobslab.dev/ontology-guide;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Serve static files; fallback to mock.html
    location / {
        try_files $uri $uri.html $uri/ /mock.html;
    }
}
