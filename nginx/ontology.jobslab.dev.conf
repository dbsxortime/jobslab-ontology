server {
    listen 80;
    listen 443 ssl;
    server_name ontology.jobslab.dev;

    # Cloudflare Origin CA cert (generated via CF API)
    ssl_certificate     /etc/nginx/ssl/ontology.jobslab.dev.crt;
    ssl_certificate_key /etc/nginx/ssl/ontology.jobslab.dev.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /home/ec2-user/jobslab-ontology/public;
    index mock.html;

    # /guide → AI interview guide on Jurin (requires claude -p)
    location = /guide {
        return 302 https://jurin.jobslab.dev/ontology-guide;
    }

    # /mock → B2B demo page
    location ~* ^/(mock|mock/)$ {
        rewrite ^ /mock.html last;
    }

    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ /mock.html;
    }
}
